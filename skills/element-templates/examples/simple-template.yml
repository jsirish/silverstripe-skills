# Simple Content Template
# A basic template with a single content block

# Preview image (optional but recommended)
SilverStripe\Assets\Image:
  simpleContentPreview:
    PopulateFileFrom: 'vendor/dynamic/recipe-silverstripe-essentials-fixtures/app/fixtures/images/previews/simple-content.jpg'
    Filename: 'assets/Templates/Simple/simple-content.jpg'
    Title: 'Simple Content Template Preview'
    PopulateMergeMatch:
      - Title

# ElementalArea - container for all elements
DNADesign\Elemental\Models\ElementalArea:
  area_simple_content:
    OwnerClassName: 'Dynamic\ElementalTemplates\Models\Template'

# Optional: Row for consistent padding/background
WeDevelop\ElementalGrid\Models\ElementRow:
  row_simple_content:
    Title: 'Content Container'
    ShowTitle: false
    AvailableGlobally: false
    IsFluid: false
    BackgroundStyle: 'bg-white'
    ContainerStyle: 'container'
    VerticalPadding: 'py-5'
    Parent: =>DNADesign\Elemental\Models\ElementalArea.area_simple_content
    Sort: 1

# The actual content element
DNADesign\Elemental\Models\ElementContent:
  simple_content_block:
    Title: 'Welcome to Our Site'
    ShowTitle: true
    AvailableGlobally: false
    HTML: |
      <p class="lead">This is a simple content template that you can customize
      for your needs.</p>
      <p>Replace this text with your own content. You can add headings,
      paragraphs, lists, and more using the rich text editor.</p>
    SizeMD: '12'
    Parent: =>DNADesign\Elemental\Models\ElementalArea.area_simple_content
    Sort: 2

# Template definition
Dynamic\ElementalTemplates\Models\Template:
  template_simple_content:
    Title: 'Simple Content'
    PageType: 'Dynamic\Base\Page\BlockPage'
    Elements: =>DNADesign\Elemental\Models\ElementalArea.area_simple_content
    LayoutImage: =>SilverStripe\Assets\Image.simpleContentPreview
    PopulateMergeMatch:
      - Title
